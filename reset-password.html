<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenForge — Reset password</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page-wrap">

  <div class="auth-header">
    <div class="logo">Open<span>Forge</span></div>
    <p class="subtitle">Set a new password for your account.</p>
  </div>

  <div class="card">

    <div id="reset-error" class="alert alert--error"></div>
    <div id="reset-success" class="alert alert--success"></div>

    <div class="field">
      <label for="new-password">New password</label>
      <input type="password" id="new-password" placeholder="8–12 characters" autocomplete="new-password" />
      <span class="field-hint">8–12 characters.</span>
    </div>

    <div class="field">
      <label for="confirm-password">Confirm new password</label>
      <input type="password" id="confirm-password" placeholder="Re-enter password" autocomplete="new-password" />
    </div>

    <button class="btn btn--primary btn--full" id="reset-btn">Update password</button>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // ── CONFIG — same values as index.html ──────────────────
  const SUPABASE_URL    = 'https://njrmizljaqsiuxhlrfia.supabase.co';
  const SUPABASE_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qcm1pemxqYXFzaXV-4aGxyZmlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDI0MDMsImV4cCI6MjA5Nzk3ODQwM30.Gw53iwGYMMONZzA6XJmdYh_fwSVWwasJ4V-P9KmE-5s';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  function showAlert(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('visible');
  }

  function clearAlerts(...ids) {
    ids.forEach(id => {
      const el = document.getElementById(id);
      el.textContent = '';
      el.classList.remove('visible');
    });
  }

  // Supabase automatically reads the recovery token from the URL
  // and creates a temporary session when this page loads after
  // the user clicks the email link. We just need to wait for it.
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      // Session is ready — user can now set a new password.
    }
  });

  document.getElementById('reset-btn').addEventListener('click', async () => {
    clearAlerts('reset-error', 'reset-success');

    const newPassword = document.getElementById('new-password').value;
    const confirm      = document.getElementById('confirm-password').value;

    if (!newPassword || !confirm) {
      showAlert('reset-error', 'Please fill in both fields.');
      return;
    }
    if (newPassword.length < 8 || newPassword.length > 12) {
      showAlert('reset-error', 'Password must be 8–12 characters.');
      return;
    }
    if (newPassword !== confirm) {
      showAlert('reset-error', 'Passwords do not match.');
      return;
    }

    const btn = document.getElementById('reset-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    const { error } = await sb.auth.updateUser({ password: newPassword });

    btn.disabled = false;
    btn.innerHTML = 'Update password';

    if (error) {
      showAlert('reset-error', error.message);
    } else {
      showAlert('reset-success', 'Password updated! Redirecting to sign in…');
      setTimeout(() => { window.location.href = 'index.html'; }, 2000);
    }
  });
</script>

</body>
</html>
